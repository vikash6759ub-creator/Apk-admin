<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SMS Controller · Secure Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 10px; color: white; }
        
        /* Login Popup */
        .login-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-card { background: linear-gradient(145deg, #1e2c42, #152233); border-radius: 40px; padding: 35px; width: 90%; max-width: 380px; border: 2px solid #4a6fa5; text-align: center; }
        .input-field { width: 100%; padding: 15px; background: #0f1a2b; border: 1px solid #3f5a8a; border-radius: 30px; color: white; margin-bottom: 15px; outline: none; text-align: center; }
        
        /* Main UI Container */
        .mobile-container { max-width: 480px; width: 100%; display: none; flex-direction: column; gap: 12px; height: 95vh; }
        
        /* Status Card */
        .status-card { background: #1e2c42; border-radius: 30px; padding: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #334155; margin-bottom: 10px; }
        
        /* Device Cards */
        .client-list { overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .client-card { 
            background: linear-gradient(145deg, #263652, #1a263b); 
            border-radius: 25px; padding: 18px; 
            display: flex; align-items: center; gap: 15px; 
            border: 1px solid #334155; margin-bottom: 12px; 
            animation: slideIn 0.3s ease-out;
            cursor: pointer;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .device-info h4 { color: #4cd964; margin-bottom: 4px; font-size: 1.1rem; }
        .device-info p { font-size: 0.9rem; color: #a0b8d9; margin: 2px 0; }
        .device-info span { font-size: 0.75rem; color: #64748b; }

        .no-data { text-align: center; margin-top: 50px; color: #4a6fa5; font-style: italic; }
        
        .badge-active { background: #064e3b; color: #4cd964; padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPopup" class="login-popup">
        <div class="login-card">
            <div style="font-size: 4rem; margin-bottom: 10px;">🌍</div>
            <h2>Admin Panel</h2>
            <p style="color: #64748b; margin-bottom: 20px;">Control Your SMS System</p>
            <input type="text" id="username" class="input-field" placeholder="Username">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <button onclick="doLogin()" style="background:#2ecc71; color:white; border:none; padding:15px; border-radius:30px; width:100%; font-weight:bold; cursor:pointer; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);">LOGIN NOW</button>
            <p id="loginError" style="color: #ff5e5e; display: none; margin-top: 15px;">❌ Invalid Credentials</p>
        </div>
    </div>

    <div id="mainApp" class="mobile-container">
        <div class="status-card">
            <i class="fas fa-wifi" id="wifiIcon" style="color: #ff5e5e; font-size: 1.8rem;"></i>
            <div style="flex: 1;">
                <div id="statusText" style="font-weight: bold; color: #ff5e5e;">Connecting...</div>
                <div id="deviceStats" style="font-size: 0.8rem; color: #a0b8d9;">Syncing with D1 Database...</div>
            </div>
            <div style="background: #0f172a; padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; border: 1px solid #334155; font-weight: bold;">ADMIN</div>
        </div>

        <h3 style="margin: 10px 0 5px 10px; font-size: 1rem; color: #a0b8d9;">REGISTERED DEVICES</h3>
        <div id="clientList" class="client-list">
            <div class="no-data" id="noDataMsg">No devices found in database.</div>
        </div>
    </div>

    <script>
        let ws = null;
        // Aapka Worker URL
        const workerUrl = 'wss://sms-tracker-worker.vikash6759ub.workers.dev/ws/admin';

        function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            if (u === 'Raj' && p === 'Raj@1994') {
                document.getElementById('loginPopup').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                connectWebSocket();
            } else {
                const err = document.getElementById('loginError');
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket(workerUrl);

                ws.onopen = () => {
                    document.getElementById('statusText').innerText = 'System Live';
                    document.getElementById('statusText').style.color = '#4cd964';
                    document.getElementById('wifiIcon').style.color = '#4cd964';
                    // Worker ko auth bhej kar D1 history maangna
                    ws.send(JSON.stringify({type: "admin_auth"}));
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    console.log("Incoming Data:", data);
                    
                    // Case 1: D1 Database se purana data aaya
                    if (data.type === 'history' && data.devices) {
                        const list = document.getElementById('clientList');
                        list.innerHTML = ''; 
                        if (data.devices.length === 0) {
                            list.innerHTML = '<div class="no-data">No history found.</div>';
                        } else {
                            data.devices.forEach(device => updateUI(device));
                        }
                    }
                    
                    // Case 2: App se naya live data aaya
                    if (data.type === 'registration') {
                        updateUI(data);
                    }
                };

                ws.onclose = () => {
                    document.getElementById('statusText').innerText = 'Reconnecting...';
                    document.getElementById('statusText').style.color = '#f1c40f';
                    document.getElementById('wifiIcon').style.color = '#f1c40f';
                    setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = (err) => { console.error("Socket Error:", err); };

            } catch (e) { console.log("Connection failed", e); }
        }

            if (noData) noData.remove();
