<!DOCTYPE html>

        .login-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-card { background: linear-gradient(145deg, #1e2c42, #152233); border-radius: 40px; padding: 35px; width: 90%; max-width: 380px; border: 2px solid #4a6fa5; text-align: center; }
        .input-field { width: 100%; padding: 15px; background: #0f1a2b; border: 1px solid #3f5a8a; border-radius: 30px; color: white; margin-bottom: 15px; outline: none; }
        .mobile-container { max-width: 480px; width: 100%; display: none; flex-direction: column; gap: 12px; }
        .status-card { background: #1e2c42; border-radius: 30px; padding: 15px; display: flex; align-items: center; gap: 12px; border: 1px solid #4cd964; }

        .popup-header { background: #1a2a4a; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #f1c40f; }
        .close-btn { background: #ff5e5e; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
